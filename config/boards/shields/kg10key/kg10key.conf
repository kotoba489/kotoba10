# Bluetoothの表示名を指定（16文字以内が推奨）
CONFIG_ZMK_KEYBOARD_NAME="kg10key"

# 接続の安定性を高める（電波出力を強化）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetooth再接続安定化
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_GATT_CACHING=n

# USBとBluetoothの有効化
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Bluetooth bond/profile を電源断後も保持する
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# 省電力設定（スリープを有効にする場合は追記）
CONFIG_ZMK_SLEEP=y

# ZMK Studio 対応
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
